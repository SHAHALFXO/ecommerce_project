<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vintage 1950 | Products</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body {
      background: #f9f5f0;
      font-family: 'Cormorant Garamond', serif;
      color: #4a3728;
    }

    .navbar {
      background: #8b6f47;
    }

    .card {
      border-radius: 16px;
      border: 1px solid #e2d6c3;
      transition: transform 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .product-img {
      height: 180px;
      object-fit: cover;
      border-radius: 12px;
    }

    .price {
      font-weight: bold;
      color: #8b6f47;
    }

    .btn-vintage {
      background: #8b6f47;
      color: white;
      border-radius: 25px;
      padding: 6px 20px;
      font-size: 14px;
    }

    .btn-vintage:hover {
      background: #a5855a;
      color: white;
    }

    .desc {
      font-size: 14px;
      color: #6b5a4a;
    }
  </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
  <a href="/frontend/index.html" class="navbar-brand">Vintage 1950</a>
  <div>
    <a href="/frontend/index.html" class="btn btn-outline-light me-2">Home</a>
    <a href="/frontend/cart.html" class="btn btn-outline-light">Cart</a>
  </div>
</nav>

<!-- PRODUCTS -->
<div class="container py-5">
  <h3 class="text-center mb-4">Our Collection</h3>

  <div class="row g-4" id="productList">
    <div class="text-center">
      <div class="spinner-border text-muted"></div>
    </div>
  </div>
</div>

<script>
const API_BASE = "http://localhost:8080";
const productList = document.getElementById("productList");

fetch(`${API_BASE}/products`)
  .then(res => res.json())
  .then(products => {
    productList.innerHTML = "";

    products.forEach(p => {
      productList.innerHTML += `
        <div class="col-md-3 col-sm-6">
          <div class="card p-3 h-100 shadow-sm">
            <a href="/frontend/product-details.html?id=${p.id}">
              <img src="${API_BASE}${p.image_url}" class="product-img mb-3">
              </a>
            <h6 class="mb-1">${p.name}</h6>
            <div class="price mb-2">₹${p.price}</div>

            <p class="desc">
              ${p.description.length > 70 
                ? p.description.substring(0, 70) + "..." 
                : p.description}
            </p>

            <button class="btn btn-vintage mt-auto"
              onclick="addToCart(${p.id})">
              Add to Cart
            </button>
          </div>
        </div>
      `;
    });
  })
  .catch(() => {
    productList.innerHTML =
      "<p class='text-center text-danger'>Failed to load products</p>";
  });

function addToCart(productID) {
  fetch(`${API_BASE}/cart/add?product_id=${productID}`, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("token")
    }
  })
  .then(() => alert("Added to cart"));
}
</script>

</body>
</html>
