<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vintage 1950 | Products</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body {
      background: #f9f5f0;
      font-family: 'Cormorant Garamond', serif;
      color: #4a3728;
    }
    .navbar {
      background: #8b6f47;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: white;
    }
    .card {
      border: 2px solid #d4c2a8;
      border-radius: 15px;
    }
    .btn-vintage {
      background: #8b6f47;
      color: white;
      border-radius: 30px;
    }
    .btn-vintage:hover {
      background: #a5855a;
    }
  </style>
</head>
<body>

<script>
  const token = localStorage.getItem("token");
  if (!token) {
    window.location.href = "index.html";
  }
</script>

<nav class="navbar navbar-dark px-4">
  <span class="logo">Vintage 1950</span>
  <div>
    <a href="profile.html" class="btn btn-outline-light me-2">Profile</a>
    <a href="cart.html" class="btn btn-outline-light">Cart</a>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="text-center mb-4">Our Vintage Collections</h2>

  <div class="row" id="productList">
    <div class="text-center">
      <div class="spinner-border text-muted"></div>
    </div>
  </div>
</div>

<script>
const API_BASE = "http://localhost:8080";
const productList = document.getElementById("productList");

fetch(`${API_BASE}/products`, {
  headers: {
    "Authorization": "Bearer " + token
  }
})
.then(res => {
  if (!res.ok) throw new Error("Failed to load products");
  return res.json();
})
.then(data => {
    console.log(data)

  productList.innerHTML = "";

  data.forEach(product => {

    productList.innerHTML += `
  <div class="col-md-4 mb-4">
    <div class="card p-3 shadow h-100">
      <img 
        src="${API_BASE}${product.image_url}" 
        class="img-fluid mb-3 rounded"
        alt="${product.name}"
      />
      <h5>${product.name}</h5>
      <p class="text-muted">₹${product.price}</p>
      <button class="btn btn-vintage mt-auto"
        onclick="addToCart(${product.id})">
        Add to Cart
      </button>
    </div>
  </div>
`;

  });
})
.catch(err => {
  productList.innerHTML = `<p class="text-center text-danger">${err.message}</p>`;
});

function addToCart(productID) {
  fetch(`${API_BASE}/cart/add?product_id=${productID}`, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + token
    }
  })
  .then(res => res.json())
  .then(data => {
    alert("Added to cart");
  })
  .catch(() => {
    alert("Failed to add item");
  });
}
</script>

</body>
</html>
