<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Vintage 1950 | Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f9f5f0;
            font-family: 'Cormorant Garamond', serif;
            color: #4a3728;
        }

        .navbar {
            background: #8b6f47;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: white;
        }

        .btn-vintage {
            background: #8b6f47;
            color: white;
            border-radius: 30px;
        }

        .qty-btn {
            width: 30px;
            height: 30px;
        }
    </style>

</head>

<body>

    <script>

        const token = localStorage.getItem("token")

        if (!token) {
            window.location.href = "index.html"
        }

    </script>

    <nav class="navbar navbar-dark px-4">

        <span class="logo">Vintage 1950</span>

        <div>
            <a href="products.html" class="btn btn-outline-light me-2">Products</a>
            <a href="profile.html" class="btn btn-outline-light">Profile</a>
        </div>

    </nav>

    <div class="container mt-5">

        <h2 class="text-center mb-4">Your Cart</h2>

        <table class="table table-bordered">

            <thead>
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>

            <tbody id="cartBody"></tbody>

        </table>

        <div class="text-end">

            <h4 id="grandTotal"></h4>

            <button class="btn btn-vintage mt-3" onclick="checkout()">
                Checkout
            </button>

        </div>

    </div>

    <script>

        const API = "http://localhost:8080"

        async function loadCart() {

            const res = await fetch(API + "/cart", {
                headers: { Authorization: "Bearer " + token }
            })

            const data = await res.json()

            const items = data.items

            const body = document.getElementById("cartBody")

            body.innerHTML = ""

            let total = 0

            items.sort((a, b) => a.ID - b.ID)

            items.forEach(item => {

                const product = item.Product

                const itemTotal = product.price * item.Quantity

                total += itemTotal

                body.innerHTML += `
<tr>

<td>${product.name}</td>

<td>₹${product.price}</td>

<td>

<button class="btn btn-secondary btn-sm qty-btn"
onclick="changeQty(${item.ProductID}, ${item.Quantity - 1})">-</button>

<span class="mx-2">${item.Quantity}</span>

<button class="btn btn-secondary btn-sm qty-btn"
onclick="changeQty(${item.ProductID}, ${item.Quantity + 1})">+</button>

</td>

<td>₹${itemTotal}</td>

<td>

<button class="btn btn-danger btn-sm"
onclick="removeItem(${item.ProductID})">
Remove
</button>

</td>

</tr>
`
            })

            document.getElementById("grandTotal").innerText = "Total: ₹" + total

        }

        async function changeQty(productID, qty) {

            const buttons = document.querySelectorAll(".qty-btn")

            buttons.forEach(btn => btn.disabled = true)

            if (qty <= 0) {

                await fetch(API + "/cart/item/" + productID, {
                    method: "DELETE",
                    headers: { Authorization: "Bearer " + token }
                })

            } else {

                await fetch(API + "/cart/item/" + productID, {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: "Bearer " + token
                    },
                    body: JSON.stringify({ quantity: qty })
                })

            }

            await loadCart()

            buttons.forEach(btn => btn.disabled = false)

        }

        async function removeItem(productID) {

            await fetch(API + "/cart/item/" + productID, {
                method: "DELETE",
                headers: { Authorization: "Bearer " + token }
            })

            loadCart()

        }

        function checkout() {

            window.location.href = "checkout.html"

        }

        loadCart()

    </script>

</body>

</html>
